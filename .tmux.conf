# ===============================================================
# === Quality of Life & Recommended Settings ==================
# ===============================================================

set -g mouse on

# Index windows and panes from 1; close gaps on window close
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Reduce escape-time for faster Neovim <Esc> response inside tmux
set -sg escape-time 10

# True color support for iTerm2
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g extended-keys on 
set -g extended-keys-format csi-u

# Vi-mode in copy mode
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi V send-keys -X select-line
if-shell "uname | grep -q Darwin" \
  "bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'pbcopy'" \
  "bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'xclip -i -selection clipboard'"

set -g history-limit 50000

# Intuitive splits that open in the current directory
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Reload config
bind r source-file ~/.tmux.conf \; display "Config Reloaded!"


# ===============================================================
# === Plugin Support ============================================
# ===============================================================

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'catppuccin/tmux'

# Catppuccin v2 configuration
set -g @catppuccin_flavor 'macchiato'
set -g @catppuccin_window_status_style "rounded"

# Initialize catppuccin before referencing its status modules.
# Skips gracefully if TPM hasn't been installed yet (fresh machine).
if-shell "test -f ~/.tmux/plugins/tmux/catppuccin.tmux" \
  "run '~/.tmux/plugins/tmux/catppuccin.tmux'"

# Status bar: directory and session name on the right
set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_directory}"
set -ag status-right "#{E:@catppuccin_status_session}"


# ===============================================================
# === Vim/Neovim Integration ====================================
# ===============================================================

# Smart pane switching with awareness of Vim splits (vim-tmux-navigator)
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\/)?g?(view|n?vim?x?)(diff)?$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h' "if-shell -F '#{pane_at_left_edge}' 'send-keys C-h' 'select-pane -L'"
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j' "if-shell -F '#{pane_at_bottom_edge}' 'send-keys C-j' 'select-pane -D'"
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k' "if-shell -F '#{pane_at_top_edge}' 'send-keys C-k' 'select-pane -U'"
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l' "if-shell -F '#{pane_at_right_edge}' 'send-keys C-l' 'select-pane -R'"

# C-l is taken by the navigator above; use Alt+L to clear the terminal
bind-key -n M-l send-keys C-l


# ===============================================================
# === Initialize TMUX plugin manager (keep at the very bottom) =
# ===============================================================
run '~/.tmux/plugins/tpm/tpm'
